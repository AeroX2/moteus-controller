; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:moteus]
platform = ststm32
framework = arduino
board = genericSTM32G431VB
debug_tool = stlink
upload_protocol = stlink
monitor_speed = 115200
monitor_port = COM7
build_flags = 
	-DARDUINO_GENERIC_G431VBTX
	-DARDUINO_NUCLEO_G431KB
	-DSIMPLEFOC_STM32_DEBUG
	-DHAL_CORDIC_MODULE_ENABLED
	-DHAL_LPTIM_MODULE_ENABLED
	-DHAL_OPAMP_MODULE_ENABLED
	-DHAL_FDCAN_MODULE_ENABLED
	-DCAN_DEBUG_ENABLED
lib_archive = false
lib_deps = 
	simplefoc/SimpleFOCDrivers
	pierremolinaro/ACANFD_STM32
	askuric/Simple FOC@^2.4.0

; Patch SimpleFOC to use an updated alignment method.
extra_scripts = pre:scripts/apply_patches.py

; TIM6 ISR for loopFOC/move at FOC_LOOP_HZ; default env:moteus stays cooperative in loop().
[env:moteus_hw_timer]
extends = env:moteus
build_flags =
	${env:moteus.build_flags}
	-DFOC_USE_HARDWARE_TIMER
