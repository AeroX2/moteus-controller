; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; Application is linked for OpenBLT (see STM32G431VBTX_FLASH_OPENBLT.ld). OpenBLT upstream is ../openblt (submodule).
; Bootloader PlatformIO project lives in ../bootloader. Build and flash the bootloader from that project
; (set board + upload_protocol=stlink in ../bootloader/platformio.ini for G431), for example from firmware/:
;   pio run -d ../bootloader -e moteus_g431 -t upload

[env:moteus]
platform = ststm32
framework = arduino
board = genericSTM32G431VB
debug_tool = stlink
upload_protocol = stlink
monitor_speed = 115200
monitor_port = COM5
board_build.ldscript = STM32G431VBTX_FLASH_OPENBLT.ld
; Arduino+OpenBLT bootloader is ~17 KB; the classic 12 KB (0x3000) slot overlaps the app.
; Reserve 20 KB (0x5000); must match ../bootloader/src/stm32/flash_layout.c first sector.
board_build.flash_offset = 0x5000
board_upload.offset_address = 0x08005000
build_flags = 
	-DARDUINO_GENERIC_G431VBTX
	-DARDUINO_NUCLEO_G431KB
	-DSIMPLEFOC_STM32_DEBUG
	-DHAL_CORDIC_MODULE_ENABLED
	-DHAL_LPTIM_MODULE_ENABLED
	-DHAL_OPAMP_MODULE_ENABLED
	-DHAL_FDCAN_MODULE_ENABLED
	-DCAN_DEBUG_ENABLED
	-DCMSIS_STARTUP_FILE=\"startup_stm32g431xx_openblt.s\"
	-I$PROJECT_DIR
lib_archive = false
lib_deps = 
	simplefoc/SimpleFOCDrivers
	pierremolinaro/ACANFD_STM32
	askuric/Simple FOC@^2.4.0
extra_scripts = 
	pre:scripts/apply_patches.py
	post:scripts/patch_openblt_vector_checksum.py

; Same firmware as env:moteus but linked at 0x08000000 and uploaded with ST-Link from the base
; of flash (overwrites OpenBLT / any bootloader). Use to rule out bootloader involvement.
; Restore OpenBLT: build+upload the bootloader from ../bootloader, then use env:moteus again.
[env:moteus_no_bootloader]
extends = env:moteus
board_build.ldscript = STM32G431VBTX_FLASH.ld
board_build.flash_offset = 0
board_upload.offset_address = 0x08000000
build_unflags = -DCMSIS_STARTUP_FILE="startup_stm32g431xx_openblt.s"

[env:moteus_hw_timer]
extends = env:moteus
build_flags = 
	${env:moteus.build_flags}
	-DFOC_USE_HARDWARE_TIMER

[env:moteus_openblt_can]
extends = env:moteus
upload_protocol = custom
upload_command = 
	"$PYTHONEXE" -u "$PROJECT_DIR/scripts/openblt_host_upload.py" "$BUILD_DIR/${PROGNAME}.elf"
extra_scripts = 
	pre:scripts/apply_patches.py
	post:scripts/patch_openblt_vector_checksum.py
	post:scripts/pio_openblt_can_env.py
; fdcanusb device format supports optional USB CDC speed:
;   mjbots_fdcanusb:COM5@1000000
custom_openblt_can_device = mjbots_fdcanusb:COM5@3000000
custom_openblt_can_tid = 667
custom_openblt_can_rid = 7E1
custom_openblt_pre_reset_r = 1
; fdcanusb COM is exclusive: quit can_monitor (or anything on that serial port) before upload.
; COM is optional: same port as mjbots_fdcanusb:COMx above is used for Commander serial.
; custom_openblt_reset_com_port = COM3
; Either list ids, or sniff the bus like can_monitor (motion/status/init frames only):
; custom_openblt_reset_target_id = 56004D
custom_openblt_reset_discover = 1
custom_openblt_reset_discover_seconds = 1.5
; custom_openblt_reset_discover_exclude = 7E1,667
custom_openblt_reset_delay = 0.5
; Max ms openblt_flash waits for bootloader XCP (default 120000 in openblt_flash.c).
custom_openblt_connect_wait_ms = 20000
